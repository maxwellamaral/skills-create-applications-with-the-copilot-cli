name: Bootstrap Exercise Steps

on:
  push:
    branches:
      - copilot/execute-mona-instructions

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  create-issue:
    name: Step 1 - Create Calculator Issue
    runs-on: ubuntu-latest
    outputs:
      issue-created: ${{ steps.create-issue.outputs.created }}

    steps:
      - name: Check if calculator issue already exists
        id: check-issue
        run: |
          ISSUE_COUNT=$(gh issue list --repo ${{ github.repository }} --search "calculator in:title" --json number --jq 'length')
          echo "Found $ISSUE_COUNT calculator issues"
          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create feature request issue for calculator app
        id: create-issue
        if: steps.check-issue.outputs.exists == 'false'
        run: |
          ISSUE_URL=$(gh issue create \
            --repo ${{ github.repository }} \
            --title "Feature Request: Node.js CLI Calculator App with Basic Arithmetic Operations" \
            --body "## Descrição da Funcionalidade

          Implementar uma calculadora de linha de comando (CLI) em Node.js com operações aritméticas básicas no arquivo \`calculator.js\`.

          ## Caso de Uso

          Os usuários precisam de uma ferramenta simples de calculadora no terminal que suporte as quatro operações aritméticas fundamentais:
          - **Adição (addition)**: Somar dois ou mais números
          - **Subtração (subtraction)**: Subtrair valores entre si
          - **Multiplicação (multiplication)**: Multiplicar valores entre si
          - **Divisão (division)**: Dividir valores entre si

          ## Solução Proposta

          Criar um arquivo \`src/calculator.js\` que implementa as seguintes funções:

          \`\`\`javascript
          // addition
          function addition(a, b) { return a + b; }

          // subtraction
          function subtraction(a, b) { return a - b; }

          // multiplication
          function multiplication(a, b) { return a * b; }

          // division
          function division(a, b) {
            if (b === 0) throw new Error('Division by zero');
            return a / b;
          }
          \`\`\`

          ## Contexto Adicional

          Esta é uma calculadora Node.js básica para fins de aprendizado com o GitHub Copilot CLI. O arquivo \`src/calculator.js\` deve incluir tratamento de erros para operações inválidas como divisão por zero." \
            --label "enhancement")
          echo "created=true" >> $GITHUB_OUTPUT
          echo "Created issue: $ISSUE_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-calc-branch:
    name: Step 2 - Create Calculator Branch
    runs-on: ubuntu-latest
    needs: create-issue

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          ref: copilot/execute-mona-instructions
          fetch-depth: 0

      - name: Wait for Step 1 workflow to complete
        run: |
          echo "Waiting 3 minutes for Step 1 workflow to process the issue..."
          sleep 180

      - name: Check if create-calc-app branch already exists
        id: check-branch
        run: |
          if git ls-remote --exit-code origin create-calc-app 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Branch create-calc-app already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Branch create-calc-app does not exist yet"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create create-calc-app branch with calculator code
        if: steps.check-branch.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b create-calc-app
          git push origin create-calc-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update existing create-calc-app branch if needed
        if: steps.check-branch.outputs.exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin create-calc-app
          # If the calculator files don't exist on create-calc-app, push them
          if ! git ls-remote origin create-calc-app | grep -q "create-calc-app"; then
            git checkout -b create-calc-app origin/create-calc-app 2>/dev/null || git checkout create-calc-app
            git merge copilot/execute-mona-instructions --no-edit -X theirs
            git push origin create-calc-app
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wait-and-trigger-step3:
    name: Step 3 - Wait for Step 2 and trigger Step 3
    runs-on: ubuntu-latest
    needs: create-calc-branch

    steps:
      - name: Wait for Step 2 workflow to complete
        run: |
          echo "Waiting 3 minutes for Step 2 workflow to process..."
          sleep 180

      - name: Checkout create-calc-app branch
        uses: actions/checkout@v5
        with:
          ref: create-calc-app
          fetch-depth: 0

      - name: Touch test file to trigger Step 3 workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add a small comment to calculator.test.js to trigger Step 3
          echo "" >> src/tests/calculator.test.js
          git add src/tests/calculator.test.js
          git commit -m "Ensure tests trigger Step 3 workflow check" || echo "No changes to commit"
          git push origin create-calc-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  disable-bootstrap:
    name: Disable Bootstrap Workflow
    runs-on: ubuntu-latest
    needs: [create-issue, create-calc-branch, wait-and-trigger-step3]
    if: always()

    steps:
      - name: Disable this bootstrap workflow
        run: |
          gh workflow disable "Bootstrap Exercise Steps"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
